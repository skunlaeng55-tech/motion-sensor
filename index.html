<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Safety Motion Sensor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #121212;
            color: white;
            padding: 20px;
            transition: background 0.3s;
        }
        /* របៀបអេក្រង់ងងឹតដើម្បីសន្សំថ្ម */
        body.eco-mode {
            background-color: #000000 !important;
        }
        body.eco-mode h1, body.eco-mode .controls, body.eco-mode #video-container {
            display: none !important; /* លាក់អ្វីៗទាំងអស់ដើម្បីកុំឱ្យស៊ីថ្ម */
        }
        body.eco-mode #ecoBtn {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            border: none;
            color: #222;
            font-size: 12px;
            z-index: 9999;
            cursor: pointer;
        }
        h1 { color: #ff3333; }
        #video-container {
            position: relative;
            width: 320px;
            height: 240px;
            margin: 20px auto;
            border: 3px solid #ff3333;
            border-radius: 8px;
            overflow: hidden;
        }
        video, canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        canvas { display: none; }
        .controls { margin: 20px; }
        button {
            font-size: 16px;
            padding: 12px 20px;
            margin: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #startBtn { background-color: #00ff88; color: black; }
        #stopBtn { background-color: #ff3333; color: white; }
        #ecoModeBtn { background-color: #007bff; color: white; }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        #status {
            font-size: 1.4rem;
            margin-top: 15px;
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 id="mainTitle">🚨 Super-Sensitive Motion Sensor (2-3M)</h1>
    
    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button id="startBtn">START SENSOR</button>
        <button id="ecoModeBtn" disabled>ECO MODE (សន្សំថ្ម)</button>
        <button id="stopBtn" disabled>STOP</button>
    </div>

    <div id="status">Status: Idle</div>
    
    <button id="ecoBtn" style="display: none;">ចុចត្រង់ណាក៏បានដើម្បីបើកអេក្រង់វិញ</button>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const ecoModeBtn = document.getElementById('ecoModeBtn');
        const ecoBtn = document.getElementById('ecoBtn');
        const statusText = document.getElementById('status');

        let stream = null;
        let animationId = null;
        let lastFrameData = null;
        let isDetecting = false;
        let lastAlertTime = 0;
        const ALERT_COOLDOWN = 6000; 

        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playLongSiren(duration = 5) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            const now = audioCtx.currentTime;
            
            for (let i = 0; i < duration; i += 0.4) {
                osc.frequency.setValueAtTime(600, now + i);
                osc.frequency.linearRampToValueAtTime(900, now + i + 0.2);
                osc.frequency.linearRampToValueAtTime(600, now + i + 0.4);
            }
            
            gain.gain.setValueAtTime(0.9, now);
            gain.gain.setValueAtTime(0.9, now + duration - 0.2);
            gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + duration);
        }

        async function startSensor() {
            try {
                statusText.innerText = "Connecting to High-Res Camera...";
                initAudio();

                // កំណត់ទាញយកកាមេរ៉ាកម្រិតច្បាស់ខ្ពស់ HD ដើម្បីមើលបានឆ្ងាយ និងច្បាស់
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 },
                        frameRate: { ideal: 30 }
                    },
                    audio: false
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    // បង្កើនទំហំ Canvas វិភាគបន្តិច ដើម្បីឱ្យចាប់កាយវិការតូចៗបានល្អជាងមុន
                    canvas.width = 128; 
                    canvas.height = 96;
                    isDetecting = true;
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    ecoModeBtn.disabled = false;
                    statusText.innerText = "🚨 Monitoring: MAXIMUM SENSITIVITY ACTIVE";
                    statusText.style.color = "#00ff88";
                    detectMotion();
                };
            } catch (err) {
                console.error(err);
                statusText.innerText = "Error: Cannot access camera.";
            }
        }

        function detectMotion() {
            if (!isDetecting) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            if (lastFrameData) {
                let changedPixels = 0;
                const totalPixels = currentFrame.data.length / 4;

                for (let i = 0; i < currentFrame.data.length; i += 4) {
                    const rDiff = Math.abs(currentFrame.data[i] - lastFrameData.data[i]);
                    const gDiff = Math.abs(currentFrame.data[i+1] - lastFrameData.data[i+1]);
                    const bDiff = Math.abs(currentFrame.data[i+2] - lastFrameData.data[i+2]);

                    // កម្រិតភាពខុសគ្នានៃពណ៌ទាបបំផុត (រាវរកសូម្បីតែបម្រែបម្រួលស្រមោលតិចតួចនៅឆ្ងាយ)
                    if (rDiff + gDiff + bDiff > 40) { 
                        changedPixels++;
                    }
                }

                const motionPercentage = (changedPixels / totalPixels) * 100;

                // កម្រិត Sensitivity ខ្ពស់បំផុត (ត្រឹមតែ 0.5% នៃអេក្រង់មានចលនា ក៏ចាប់បានដែរ)
                if (motionPercentage > 0.5) {
                    triggerVoiceAlert();
                }
            }

            lastFrameData = currentFrame;
            animationId = requestAnimationFrame(detectMotion);
        }

        function triggerVoiceAlert() {
            const now = Date.now();
            if (now - lastAlertTime > ALERT_COOLDOWN) {
                lastAlertTime = now;
                
                // បន្លឺសំឡេងរោទិ៍ខ្លាំង ៥ វិនាទី
                playLongSiren(5);

                if (!document.body.classList.contains('eco-mode')) {
                    statusText.innerText = "⚠️ INTRUDER DETECTED!";
                    statusText.style.color = "#ff3333";
                    setTimeout(() => {
                        if (isDetecting && !document.body.classList.contains('eco-mode')) {
                            statusText.innerText = "🚨 Monitoring: MAXIMUM SENSITIVITY ACTIVE";
                            statusText.style.color = "#00ff88";
                        }
                    }, 5000);
                }
            }
        }

        // បើករបៀបសន្សំសំចៃថ្ម (ធ្វើឱ្យអេក្រង់ខ្មៅងងឹតទាំងស្រុង ប៉ុន្តែកាមេរ៉ានៅតែដំណើរការ)
        ecoModeBtn.addEventListener('click', () => {
            document.body.classList.add('eco-mode');
            ecoBtn.style.display = "block";
        });

        // ចុចលើអេក្រង់ខ្មៅ ដើម្បីត្រឡប់មកធម្មតាវិញ
        ecoBtn.addEventListener('click', () => {
            document.body.classList.remove('eco-mode');
            ecoBtn.style.display = "none";
        });

        function stopSensor() {
            isDetecting = false;
            if (animationId) cancelAnimationFrame(animationId);
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            video.srcObject = null;
            lastFrameData = null;
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            ecoModeBtn.disabled = true;
            document.body.classList.remove('eco-mode');
            ecoBtn.style.display = "none";
            statusText.innerText = "Sensor Stopped.";
            statusText.style.color = "#ffcc00";
        }

        startBtn.addEventListener('click', startSensor);
        stopBtn.addEventListener('click', stopSensor);
    </script>
</body>
</html>
